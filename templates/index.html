<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Ufficiale</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #050505; /* 纯黑背景吸收反光 */
            color: #fff;
            font-family: 'Helvetica Neue', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 主标题霓虹发光 */
        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            margin-bottom: 50px;
            text-align: center;
        }

        /* 论据展示卡片：毛玻璃加暗色边框 */
        .evidence-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .evidence-card:hover {
            transform: translateY(-5px); /* 鼠标悬浮时的物理抬升交互 */
            border-color: rgba(0, 255, 255, 0.6);
        }

        h2 {
            color: #0ff;
            margin-top: 0;
            font-size: 1.5rem;
        }

        p {
            line-height: 1.6;
            color: #ccc;
        }
    </style>
</head>
<body>

    <h1>Perché ZEFH è GAY:<br>Analisi Scientifica</h1>

    <div class="evidence-card">
        <h2>论点 1：[在这里输入他的某个行为]</h2>
        <p>详细描述这个行为的荒谬之处。从第一性原理出发，这种行为在物理学和生物学上只能推导出一个结论...</p>
    </div>

    <div class="evidence-card">
        <h2>论点 2：[在这里输入他的某句话]</h2>
        <p>引用他曾经说过的话，并进行毫无逻辑但看似严谨的过度解读 (Sovrainterpretazione)...</p>
    </div>

    <div class="evidence-card">
        <h2>结论 (Conclusione)</h2>
        <p>Q.E.D. (Quod Erat Demonstrandum)</p>
    </div>

</body>
</html>
